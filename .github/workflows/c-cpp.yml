name: C CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc

    - name: Compile Expression Parser
      # Bu yerda barcha .c fayllarni kompilyatsiya qilamiz. 
      # -O3 optimizatsiya va -lm matematik kutubxona uchun.
      run: |
        mkdir -p bin
        gcc src/*.c -Iinclude -O3 -o bin/parser -lm

    - name: Run Basic Test
# Agar executable argument qabul qilsa, uni shu yerda sinab ko'ramiz
      run: |
        chmod +x bin/parser
        ./bin/parser "2 + 2 * (3 - 1)" || echo "Test run completed"
