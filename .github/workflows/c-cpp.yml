name: C CI (using Makefile)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      # Kodni yuklab olish
      uses: actions/checkout@v4

    - name: Install dependencies
      # Build-essential paketi ichida make va gcc bo'ladi
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Build with Makefile
      # Makefile-da ko'rsatilgan standart qoidani (odatda 'all') ishga tushiradi
      run: make

    - name: Run Tests
      # Agar Makefile ichida 'test' qoidasi bo'lsa, shuni ishlatadi. 
      # Bo'lmasa, o'zingizning binary faylingizni (masalan, ./parser) chaqiring.
      run: make test || ./expression_parser "2+2"
